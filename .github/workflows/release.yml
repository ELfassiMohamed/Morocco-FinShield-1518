name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tagName = "${{ inputs.tag_name }}"
          } else {
            $tagName = "${{ github.ref_name }}"
          }

          if ($tagName -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag '$tagName' must match vMAJOR.MINOR.PATCH, for example v1.2.0."
          }

          $version = $tagName.Substring(1)
          "tag_name=$tagName" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag_name }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build JAR
        run: mvn -B clean package

      - name: Stage release JAR
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -Path target/kantara.jar -Destination "dist/kantara-${{ steps.release.outputs.version }}.jar"

      - name: Create Windows icon
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing

          $sourcePath = "src/main/resources/public/asset/kantara_icon.png"
          $iconPath = "dist/kantara.ico"

          $source = [System.Drawing.Image]::FromFile($sourcePath)
          $bitmap = New-Object System.Drawing.Bitmap 256, 256
          $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
          $graphics.InterpolationMode = [System.Drawing.Drawing2D.InterpolationMode]::HighQualityBicubic
          $graphics.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::HighQuality
          $graphics.PixelOffsetMode = [System.Drawing.Drawing2D.PixelOffsetMode]::HighQuality
          $graphics.Clear([System.Drawing.Color]::Transparent)
          $graphics.DrawImage($source, 0, 0, 256, 256)

          $pngStream = New-Object System.IO.MemoryStream
          $bitmap.Save($pngStream, [System.Drawing.Imaging.ImageFormat]::Png)
          $pngBytes = $pngStream.ToArray()

          $iconStream = [System.IO.File]::Create($iconPath)
          $writer = New-Object System.IO.BinaryWriter($iconStream)
          $writer.Write([UInt16]0)
          $writer.Write([UInt16]1)
          $writer.Write([UInt16]1)
          $writer.Write([Byte]0)
          $writer.Write([Byte]0)
          $writer.Write([Byte]0)
          $writer.Write([Byte]0)
          $writer.Write([UInt16]1)
          $writer.Write([UInt16]32)
          $writer.Write([UInt32]$pngBytes.Length)
          $writer.Write([UInt32]22)
          $writer.Write($pngBytes)

          $writer.Dispose()
          $iconStream.Dispose()
          $pngStream.Dispose()
          $graphics.Dispose()
          $bitmap.Dispose()
          $source.Dispose()

      - name: Build Windows app image
        shell: pwsh
        run: |
          jpackage `
            --type app-image `
            --name Kantara `
            --app-version "${{ steps.release.outputs.version }}" `
            --input target `
            --main-jar kantara.jar `
            --main-class com.kantara.web.Main `
            --icon dist/kantara.ico `
            --dest dist/jpackage

      - name: Package Windows app image
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist/jpackage/Kantara `
            -DestinationPath "dist/kantara-windows-${{ steps.release.outputs.version }}.zip" `
            -Force

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          name: ${{ steps.release.outputs.tag_name }}
          files: |
            dist/kantara-${{ steps.release.outputs.version }}.jar
            dist/kantara-windows-${{ steps.release.outputs.version }}.zip
