<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kantara - Local Document Preprocessor</title>
    <link rel="stylesheet" href="styles.css">
    <!-- highlight.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="k-root">
            <header class="k-header">
                <div class="k-brand">
                    <div class="k-logo">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="3" y="2" width="12" height="2" rx="1" fill="white" opacity="0.9"/>
                            <rect x="3" y="6" width="8" height="2" rx="1" fill="white" opacity="0.7"/>
                            <rect x="3" y="10" width="10" height="2" rx="1" fill="white" opacity="0.7"/>
                            <rect x="3" y="14" width="6" height="2" rx="1" fill="white" opacity="0.5"/>
                        </svg>
                    </div>
                    <div>
                        <div class="k-title">Kantara</div>
                        <div class="k-subtitle">Local document preprocessor</div>
                    </div>
                </div>
            </header>

            <div class="k-body">
                <div class="k-toolbar">
                    <div style="display:flex;align-items:center;gap:12px;">
                        <span style="font-size:12px;color:rgba(232,229,223,0.35);letter-spacing:0.06em;text-transform:uppercase;">Output format</span>
                        <div class="k-format-group" id="format-toggle">
                            <input type="radio" id="format-json" name="format" value="json" checked>
                            <label for="format-json" class="k-format-btn">JSON</label>
                            
                            <input type="radio" id="format-markdown" name="format" value="markdown">
                            <label for="format-markdown" class="k-format-btn">Markdown</label>
                        </div>
                    </div>
                </div>

                <div class="k-drop" id="upload-zone">
                    <input type="file" id="file-input" accept=".pdf,.xlsx,.csv" style="display: none;">
                    <div class="k-drop-icon">
                        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                            <path d="M14 4v14M8 12l6-6 6 6" stroke="rgba(232,229,223,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M4 20v2a2 2 0 002 2h16a2 2 0 002-2v-2" stroke="rgba(232,229,223,0.25)" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="k-drop-text">Drop a document here</div>
                    <div class="k-drop-hint">PDF · XLSX · CSV · up to 50 MB</div>
                </div>

                <div class="processing-state hidden" id="processing-state">
                    <div class="spinner"></div>
                    <p style="font-size: 14px; color: var(--text-muted);">Extracting and optimizing tokens...</p>
                </div>

                <div class="results-section hidden" id="results-section">
                    <div class="k-file-card">
                        <div class="k-file-bar">
                            <span id="res-filename" class="k-file-name">filename.pdf</span>
                            <div class="k-tooltip-container">
                                <span id="res-tokens" class="k-badge k-badge-token">~0 LLM tokens</span>
                                <div class="k-tooltip">Estimated token count when this output is sent to an LLM (GPT-4, Claude, etc.). Based on ~4 chars/token.</div>
                            </div>

                            <div class="k-view-toggle hidden" id="view-toggle">
                                <button class="k-view-btn active" data-view="rendered">Rendered</button>
                                <button class="k-view-btn" data-view="raw">Raw</button>
                            </div>
                            <div class="k-file-actions">
                                <button id="btn-clear" class="k-btn k-btn-ghost" title="Upload new file">
                                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                                </button>
                                <button id="btn-copy" class="k-btn k-btn-ghost">
                                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="3" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M4 3V2a1 1 0 011-1h6a1 1 0 011 1v8a1 1 0 01-1 1h-1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
                                    Copy
                                </button>
                                <button id="btn-download" class="k-btn k-btn-primary">
                                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 11h10" stroke="white" stroke-width="1.3" stroke-linecap="round"/></svg>
                                    Download
                                </button>
                            </div>
                        </div>
                        <div class="k-code-area">
                            <div id="output-rendered" class="k-rendered-content hidden"></div>
                            <pre id="output-raw"><code id="output-code" class="language-json"></code></pre>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="error-toast hidden" id="error-toast">
            <span id="error-message">Error processing file</span>
            <button id="close-error">&times;</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
