<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kantara - Local Document Preprocessor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- highlight.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                <h1>Kantara</h1>
            </div>
            <p class="subtitle">Local Document Preprocessor for LLMs</p>
        </header>

        <main>
            <div class="controls-section">
                <div class="format-selector">
                    <label>Output Format:</label>
                    <div class="toggle-group" id="format-toggle">
                        <input type="radio" id="format-json" name="format" value="json" checked>
                        <label for="format-json">JSON</label>
                        
                        <input type="radio" id="format-markdown" name="format" value="markdown">
                        <label for="format-markdown">Markdown</label>
                    </div>
                </div>
            </div>

            <div class="upload-zone" id="upload-zone">
                <input type="file" id="file-input" accept=".pdf,.xlsx,.csv" style="display: none;">
                <div class="upload-content">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <h3>Drag & Drop file here</h3>
                    <p>or click to browse</p>
                    <span class="supported-formats">Supported: PDF, XLSX, CSV (Max 50MB)</span>
                </div>
            </div>

            <div class="processing-state hidden" id="processing-state">
                <div class="spinner"></div>
                <p>Extracting and optimizing tokens...</p>
            </div>

            <div class="results-section hidden" id="results-section">
                <div class="results-header">
                    <div class="file-info">
                        <span id="res-filename" class="tag file-tag">filename.pdf</span>
                        <span id="res-tokens" class="tag token-tag">~0 tokens</span>
                        <span id="res-time" class="tag time-tag">0ms</span>
                    </div>
                    <div class="actions">
                        <button id="btn-copy" class="btn secondary">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            Copy
                        </button>
                        <button id="btn-download" class="btn primary">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            Download
                        </button>
                    </div>
                </div>
                <div class="code-container">
                    <pre><code id="output-code" class="language-json"></code></pre>
                </div>
            </div>
            
            <div class="error-toast hidden" id="error-toast">
                <span id="error-message">Error processing file</span>
                <button id="close-error">&times;</button>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
